<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ye Jeong Park</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f14;
      color: #f4f4f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #a1a1aa;
    }

    .hero .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1.25rem;
      border: 1px solid #3f3f46;
      border-radius: 999px;
      font-size: 0.9rem;
      color: #d4d4d8;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Ye Jeong Park</h1>
    <p>English major | Building things, one project at a time.</p>
    <span class="badge">Welcome to my page</span>
  </main>
</body>
</html>
